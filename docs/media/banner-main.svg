  <line x1="993" y1="146" x2="940" y2="182" stroke="#E84393" stroke-width="1.5" opacity="0.3" stroke-dasharray="4,3"/>
  <!-- Node 3: RAG -->
  <circle cx="925" cy="200" r="22" fill="none" stroke="#43E97B" stroke-width="2" opacity="0.6"/>
  <circle cx="925" cy="200" r="8" fill="#43E97B" opacity="0.8"/>
