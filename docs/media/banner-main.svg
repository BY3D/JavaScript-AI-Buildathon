  <text x="50" y="390" font-family="'Segoe UI',Roboto,sans-serif" font-size="12" font-weight="bold" fill="#7B68EE">#JSAIBuildathon</text>
  <text x="189" y="390" font-family="'Segoe UI',Roboto,sans-serif" font-size="12" fill="#666">•  aka.ms/JSAIBuildathon</text>
