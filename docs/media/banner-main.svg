  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#121233;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a0a1a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7B68EE;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4158D0;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F7DF1E;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E8C800;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#43E97B;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#38F9D7;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3178C6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#235A9E;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F7DF1E;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#43E97B;stop-opacity:1"/>
