    <circle cx="1106" cy="22" r="1.5"/>
    <circle cx="1119" cy="22" r="1.5"/>
    <circle cx="1132" cy="22" r="1.5"/>
    <circle cx="1145" cy="22" r="1.5"/>
    <circle cx="1158" cy="22" r="1.5"/>
    <circle cx="1093" cy="34" r="1.5"/>
    <circle cx="1106" cy="34" r="1.5"/>
    <circle cx="1119" cy="34" r="1.5"/>
    <circle cx="1132" cy="34" r="1.5"/>
    <circle cx="1145" cy="34" r="1.5"/>
    <circle cx="1158" cy="34" r="1.5"/>
