    <path d="M1110 290 L1111.2 294 L1115 295.2 L1111.2 296.4 L1110 300 L1108.8 296.4 L1105 295.2 L1108.8 294 Z" fill="#E84393"/>
    <path d="M1075 285 L1076 288 L1079 289 L1076 290 L1075 293 L1074 290 L1071 289 L1074 288 Z" fill="#43E97B"/>
